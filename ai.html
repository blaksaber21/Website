            messing around with mixing ai models feel free to use.

            id="prompt"
            placeholder="Ask me anything..."
            rows="5"></textarea>

<script>
async function sendPrompt() {

    const button = document.getElementById("send-btn");
    const responseBox = document.getElementById("response");
    const prompt = document.getElementById("prompt").value.trim();

    if (!prompt) return;

    button.disabled = true;
    button.textContent = "Thinking...";
    responseBox.textContent = "Generating response...";

    try {

        const res = await fetch("https://api.owenpinard.com/chat.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: prompt
            })
        });

        const data = await res.json();

        responseBox.textContent = data.response || data.error || "Unknown error.";

    } catch (err) {

        responseBox.textContent = "Unable to reach the AI server.";

    }

    button.disabled = false;
    button.textContent = "Send";
}
</script>
